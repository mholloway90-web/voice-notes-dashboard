
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 1.25rem 1rem 3rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header h1 span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: #666;
      margin-top: 2px;
      letter-spacing: 0;
    }

    #refresh-btn {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      color: #f0f0f0;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #refresh-btn:active { opacity: 0.7; }

    /* View switcher (All Notes / Open Loops) */
    .view-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .view-tab {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #666;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .view-tab.active {
      background: #2a2a2a;
      color: #fff;
      border-color: #444;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
    }

    .stat-label {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .filter-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #666;
      font-size: 13px;
      cursor: pointer;
    }

    .filter-btn.active {
      background: #2a2a2a;
      color: #fff;
      border-color: #444;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 1rem;
    }

    .note-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
    }

    .note-card.expanded { border-color: #3a3a3a; }

    .note-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .note-transcript {
      font-size: 14px;
      color: #ccc;
      line-height: 1.5;
      flex: 1;
    }

    .note-transcript.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .note-date {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
    }

    .priority-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 500;
    }

    .priority-HIGH { background: #3a1515; color: #f87171; }
    .priority-MED { background: #3a2e15; color: #fbbf24; }
    .priority-LOW { background: #1a2e1a; color: #4ade80; }
    .priority-null { background: #1a1a1a; color: #555; }

    .note-divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 12px 0;
    }

    .extraction-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 8px;
    }

    .note-response {
      font-size: 13px;
      color: #bbb;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .expand-hint {
      font-size: 11px;
      color: #555;
      margin-top: 8px;
    }

    /* Open loops view */
    .loops-header {
      font-size: 13px;
      color: #888;
      margin-bottom: 1rem;
    }

    #loops-count { color: #fff; font-weight: 600; }

    .job-group { margin-bottom: 1.5rem; }

    .job-group-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .job-count {
      background: #2a2a2a;
      color: #aaa;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 10px;
    }

    .loop-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 10px;
    }

    .loop-summary {
      font-size: 14px;
      color: #ccc;
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .loop-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .loop-date {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
    }

    .resolve-btn {
      background: #16331f;
      color: #4ade80;
      border: 1px solid #265a35;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      min-height: 40px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .resolve-btn:active { opacity: 0.7; }
    .resolve-btn:disabled { opacity: 0.5; cursor: default; }

    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: #555;
      font-size: 14px;
      line-height: 1.7;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #555;
      font-size: 14px;
    }

    .error {
      background: #2a1515;
      border: 1px solid #4a2020;
      border-radius: 10px;
      padding: 1rem;
      font-size: 13px;
      color: #f87171;
      line-height: 1.6;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <header>
    <h1>
      <span class="dot"></span>Voice Notes
      <span>Telegram &rarr; Whisper &rarr; Claude</span>
    </h1>
    <button id="refresh-btn" onclick="refreshActiveView()">&#8635; Refresh</button>
  </header>

  <div class="view-switch">
    <button class="view-tab active" onclick="switchView('notes', this)">All Notes</button>
    <button class="view-tab" onclick="switchView('loops', this)">Open Loops</button>
  </div>

  <div id="notes-view">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('JOBSITE', this)">&#127959;&#65039; Job Site</button>
      <button class="filter-btn" onclick="setFilter('GENERAL', this)">&#129504; General</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setPriority('all', this)">All</button>
      <button class="filter-btn" onclick="setPriority('HIGH', this)">&#128308; High</button>
      <button class="filter-btn" onclick="setPriority('MED', this)">&#128993; Med</button>
      <button class="filter-btn" onclick="setPriority('LOW', this)">&#128994; Low</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="total">&mdash;</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="today">&mdash;</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="week">&mdash;</div>
        <div class="stat-label">This week</div>
      </div>
    </div>

    <div id="notes-container" class="notes-list">
      <div class="loading">Loading your notes...</div>
    </div>
  </div>

  <div id="loops-view" style="display:none;">
    <div class="loops-header"><span id="loops-count">&mdash;</span> open loops</div>
    <div id="loops-container" class="notes-list">
      <div class="loading">Loading open loops...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ecjmqwdijgsycbqkfcog.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjam1xd2RpamdzeWNicWtmY29nIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDAxMzMxNSwiZXhwIjoyMDk1NTg5MzE1fQ.x6CP4ltoczdPZ-aV8UTci2DUSXzKlBEbubS35QKvqPY';

    let activeFilter = 'all';
    let activePriority = 'all';
    let activeView = 'notes';

    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filters:first-of-type .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadNotes();
    }

    function setPriority(priority, btn) {
      activePriority = priority;
      document.querySelectorAll('.filters:nth-of-type(2) .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadNotes();
    }

    function switchView(view, btn) {
      activeView = view;
      document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const notesView = document.getElementById('notes-view');
      const loopsView = document.getElementById('loops-view');
      if (view === 'loops') {
        notesView.style.display = 'none';
        loopsView.style.display = 'block';
        loadOpenLoops();
      } else {
        loopsView.style.display = 'none';
        notesView.style.display = 'block';
      }
    }

    function refreshActiveView() {
      if (activeView === 'loops') loadOpenLoops();
      else loadNotes();
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function isToday(ts) {
      return new Date(ts).toDateString() === new Date().toDateString();
    }

    function isThisWeek(ts) {
      return (new Date() - new Date(ts)) / (1000 * 60 * 60 * 24) <= 7;
    }

    function toggleNote(id) {
      const card = document.getElementById('card-' + id);
      const transcript = document.getElementById('transcript-' + id);
      const extraction = document.getElementById('extraction-' + id);
      const hint = document.getElementById('hint-' + id);
      const expanded = card.classList.toggle('expanded');
      transcript.classList.toggle('collapsed', !expanded);
      extraction.style.display = expanded ? 'block' : 'none';
      hint.textContent = expanded ? 'Tap to collapse' : 'Tap to expand';
    }

    async function loadNotes() {
      const container = document.getElementById('notes-container');
      container.innerHTML = '<div class="loading">Loading your notes...</div>';

      try {
        const typeFilter = activeFilter === 'all' ? '' : `&note_type=eq.${activeFilter}`;
        const priorityFilter = activePriority === 'all' ? '' : `&priority=eq.${activePriority}`;
        const res = await fetch(`${SUPABASE_URL}/rest/v1/voice_notes?select=*&order=created_at.desc&limit=50${typeFilter}${priorityFilter}`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        if (!res.ok) throw new Error(`${res.status} — ${res.statusText}`);
        const notes = await res.json();

        document.getElementById('total').textContent = notes.length;
        document.getElementById('today').textContent = notes.filter(n => isToday(n.created_at)).length;
        document.getElementById('week').textContent = notes.filter(n => isThisWeek(n.created_at)).length;

        if (!notes.length) {
          container.innerHTML = `
            <div class="empty">
              <div class="empty-icon">🎙️</div>
              No voice notes yet.<br>Send one to your Telegram bot to get started.
            </div>`;
          return;
        }

        container.innerHTML = notes.map(n => `
          <div class="note-card" id="card-${n.id}" onclick="toggleNote(${n.id})">
            <div class="note-top">
              <div class="note-transcript collapsed" id="transcript-${n.id}">${n.transcript || 'No transcript'}</div>
              <div class="note-meta">
                <div class="note-date">${formatDate(n.created_at)}</div>
                <span class="priority-badge priority-${n.priority || 'null'}">${n.priority || '—'}</span>
              </div>
            </div>
            <div class="expand-hint" id="hint-${n.id}">Tap to expand</div>
            <div id="extraction-${n.id}" style="display:none;">
              <hr class="note-divider">
              <div class="extraction-label">Claude's extraction</div>
              <div class="note-response">${n.claude_response || 'No extraction'}</div>
            </div>
          </div>
        `).join('');

      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load notes: ${err.message}</div>`;
      }
    }

    async function loadOpenLoops() {
      const container = document.getElementById('loops-container');
      container.innerHTML = '<div class="loading">Loading open loops...</div>';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/voice_notes?select=*&is_open_loop=is.true&loop_resolved=not.is.true&order=created_at.desc`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        if (!res.ok) throw new Error(`${res.status} — ${res.statusText}`);
        const loops = await res.json();

        document.getElementById('loops-count').textContent = loops.length;

        if (!loops.length) {
          container.innerHTML = `
            <div class="empty">
              <div class="empty-icon">✅</div>
              No open loops.<br>You're all caught up.
            </div>`;
          return;
        }

        const groups = {};
        loops.forEach(n => {
          const job = n.job_name || 'No job';
          (groups[job] = groups[job] || []).push(n);
        });

        container.innerHTML = Object.keys(groups).map(job => {
          const cards = groups[job].map(n => `
            <div class="loop-card" id="loop-card-${n.id}">
              <div class="loop-summary">${escapeHtml(n.claude_response || n.transcript || 'No summary')}</div>
              <div class="loop-bottom">
                <span class="loop-date">${formatDate(n.created_at)}</span>
                <button class="resolve-btn" onclick="resolveLoop(${n.id}, this)">Resolve</button>
              </div>
            </div>
          `).join('');
          return `
            <div class="job-group">
              <div class="job-group-title">${escapeHtml(job)} <span class="job-count">${groups[job].length}</span></div>
              ${cards}
            </div>`;
        }).join('');

      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load open loops: ${err.message}</div>`;
      }
    }

    async function resolveLoop(id, btnEl) {
      btnEl.disabled = true;
      btnEl.textContent = 'Resolving...';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/voice_notes?id=eq.${id}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
          },
          body: JSON.stringify({
            loop_resolved: true,
            resolved_at: new Date().toISOString()
          })
        });

        if (!res.ok) throw new Error(`${res.status} — ${res.statusText}`);

        const updated = await res.json();
        if (!updated.length) {
          throw new Error('Nothing was updated. This is usually a row level security UPDATE policy blocking the write on voice_notes.');
        }

        // Remove the resolved card, matched by its stable id.
        const card = document.getElementById('loop-card-' + id);
        if (card) {
          const group = card.closest('.job-group');
          card.remove();
          // If that job has no remaining open loops, drop the whole group.
          if (group && !group.querySelector('.loop-card')) group.remove();
        }

        // Update the count, and show the empty state if everything is cleared.
        const remaining = container_loopCount();
        document.getElementById('loops-count').textContent = remaining;
        if (remaining === 0) {
          document.getElementById('loops-container').innerHTML = `
            <div class="empty">
              <div class="empty-icon">✅</div>
              No open loops.<br>You're all caught up.
            </div>`;
        }

      } catch (err) {
        btnEl.disabled = false;
        btnEl.textContent = 'Resolve';
        alert('Could not resolve: ' + err.message);
      }
    }

    function container_loopCount() {
      return document.getElementById('loops-container').querySelectorAll('.loop-card').length;
    }

    loadNotes();
  </script>

</body>
</html>
