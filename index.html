<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 1.25rem 1rem 3rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header h1 span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: #666;
      margin-top: 2px;
      letter-spacing: 0;
    }

    #refresh-btn {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      color: #f0f0f0;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #refresh-btn:active { opacity: 0.7; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
    }

    .stat-label {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
    }

    .note-card.expanded { border-color: #3a3a3a; }

    .note-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .note-transcript {
      font-size: 14px;
      color: #ccc;
      line-height: 1.5;
      flex: 1;
    }

    .note-transcript.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-date {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .note-divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 12px 0;
    }

    .extraction-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 8px;
    }

    .note-response {
      font-size: 13px;
      color: #bbb;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .expand-hint {
      font-size: 11px;
      color: #555;
      margin-top: 8px;
    }

    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: #555;
      font-size: 14px;
      line-height: 1.7;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #555;
      font-size: 14px;
    }

    .error {
      background: #2a1515;
      border: 1px solid #4a2020;
      border-radius: 10px;
      padding: 1rem;
      font-size: 13px;
      color: #f87171;
      line-height: 1.6;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <header>
    <h1>
      <span class="dot"></span>Voice Notes
      <span>Telegram → Whisper → Claude</span>
    </h1>
    <button id="refresh-btn" onclick="loadNotes()">↻ Refresh</button>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="today">—</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="week">—</div>
      <div class="stat-label">This week</div>
    </div>
  </div>

  <div id="notes-container" class="notes-list">
    <div class="loading">Loading your notes...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ecjmqwdijgsycbqkfcog.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YlXS75vOvUNuPFVHdiV5-w_Zk4Z_wP5';

    function formatDate(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function isToday(ts) {
      return new Date(ts).toDateString() === new Date().toDateString();
    }

    function isThisWeek(ts) {
      return (new Date() - new Date(ts)) / (1000 * 60 * 60 * 24) <= 7;
    }

    function toggleNote(id) {
      const card = document.getElementById('card-' + id);
      const transcript = document.getElementById('transcript-' + id);
      const extraction = document.getElementById('extraction-' + id);
      const hint = document.getElementById('hint-' + id);
      const expanded = card.classList.toggle('expanded');
      transcript.classList.toggle('collapsed', !expanded);
      extraction.style.display = expanded ? 'block' : 'none';
      hint.textContent = expanded ? 'Tap to collapse' : 'Tap to expand';
    }

    async function loadNotes() {
      const container = document.getElementById('notes-container');
      container.innerHTML = '<div class="loading">Loading your notes...</div>';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/voice_notes?select=*&order=created_at.desc&limit=50`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        if (!res.ok) throw new Error(`${res.status} — ${res.statusText}`);
        const notes = await res.json();

        document.getElementById('total').textContent = notes.length;
        document.getElementById('today').textContent = notes.filter(n => isToday(n.created_at)).length;
        document.getElementById('week').textContent = notes.filter(n => isThisWeek(n.created_at)).length;

        if (!notes.length) {
          container.innerHTML = `
            <div class="empty">
              <div class="empty-icon">🎙️</div>
              No voice notes yet.<br>Send one to your Telegram bot to get started.
            </div>`;
          return;
        }

        container.innerHTML = notes.map(n => `
          <div class="note-card" id="card-${n.id}" onclick="toggleNote(${n.id})">
            <div class="note-top">
              <div class="note-transcript collapsed" id="transcript-${n.id}">${n.transcript || 'No transcript'}</div>
              <div class="note-date">${formatDate(n.created_at)}</div>
            </div>
            <div class="expand-hint" id="hint-${n.id}">Tap to expand</div>
            <div id="extraction-${n.id}" style="display:none;">
              <hr class="note-divider">
              <div class="extraction-label">Claude's extraction</div>
              <div class="note-response">${n.claude_response || 'No extraction'}</div>
            </div>
          </div>
        `).join('');

      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load notes: ${err.message}</div>`;
      }
    }

    loadNotes();
  </script>

</body>
</html>
